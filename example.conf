#server {
#   listen PORT // mandatory 1st line
server {
	listen 8080
	host localhost
	root /www
	client_max_body_size 3000000
	error_page 404 error_pages/404.html

    location / {
        allow_methods  DELETE POST GET
        autoindex off
    }

    location /dir1 {
        root /var/usr
        index index.html
        allow_methods GET POST PUT
    }

    location /red {
        return 301 /tours
    }

    location /cgi-bin {
        root ./
        allow_methods GET POST DELETE
        index time.py
        cgi_path /usr/bin/python3 /bin/bash
        cgi_ext .py .sh
    }
}
